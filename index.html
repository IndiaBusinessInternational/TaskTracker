<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBI Task Target &amp; Completion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#00c5ff;
    --bg:#000000;
    --surface:#0d0f12;
    --surface2:#15191e;
    --surface3:#1d2228;
    --border:#2a3038;
    --text:#e7edf3;
    --muted:#8a97a6;
    --green:#27d07b;
    --amber:#ffb020;
    --red:#ff5470;
    --violet:#9b8cff;
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  [data-theme="light"]{
    --bg:#eef2f6;
    --surface:#ffffff;
    --surface2:#f4f7fa;
    --surface3:#e8eef3;
    --border:#d4dde6;
    --text:#10161d;
    --muted:#5b6876;
    --shadow:0 8px 30px rgba(20,40,60,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Roboto',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;font-size:14px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ---------- HEADER ---------- */
  header{
    background:linear-gradient(180deg,#000 0%,#06080b 100%);
    border-bottom:1px solid var(--border);
    padding:10px 16px;position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:14px;
  }
  [data-theme="light"] header{background:linear-gradient(180deg,#0a0e13 0%,#11161d 100%)}
  .version-badge{
    background:var(--accent);color:#001018;font-weight:900;
    font-size:11px;padding:3px 9px;border-radius:6px;letter-spacing:.4px;
    white-space:nowrap;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;flex-shrink:0}
  .brand-text{min-width:0}
  .brand-text h1{font-size:16px;font-weight:900;color:#fff;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-text .sub{font-size:10.5px;color:var(--accent);font-weight:500;letter-spacing:.5px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .clock{font-size:11.5px;color:var(--muted);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .icon-btn{
    background:var(--surface3);border:1px solid var(--border);color:var(--text);
    width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:16px;
    transition:.15s;
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .whoami{
    font-size:12px;background:var(--surface3);border:1px solid var(--border);
    padding:6px 11px;border-radius:9px;display:flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .whoami .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .whoami b{color:var(--accent)}
  .logout{color:var(--muted);font-size:11px;background:none;border:none;text-decoration:underline}
  .logout:hover{color:var(--red)}

  /* ---------- LAYOUT ---------- */
  .wrap{max-width:1180px;margin:0 auto;padding:16px}
  .nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .nav button{
    background:var(--surface);border:1px solid var(--border);color:var(--muted);
    padding:9px 15px;border-radius:10px;font-size:13px;font-weight:500;transition:.15s;
  }
  .nav button.active{background:var(--accent);color:#001018;border-color:var(--accent);font-weight:700}
  .nav button:hover:not(.active){color:var(--text);border-color:var(--accent)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .card + .card{margin-top:16px}
  h2.section{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  h2.section::before{content:"";width:4px;height:16px;background:var(--accent);border-radius:3px}

  /* ---------- KPI GRID ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;right:-18px;top:-18px;width:60px;height:60px;border-radius:50%;background:var(--accent);opacity:.06}
  .kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
  .kpi .value{font-size:30px;font-weight:900;line-height:1.1;margin-top:6px}
  .kpi .value small{font-size:14px;font-weight:500;color:var(--muted)}
  .kpi.green .value{color:var(--green)} .kpi.amber .value{color:var(--amber)}
  .kpi.red .value{color:var(--red)} .kpi.cyan .value{color:var(--accent)}

  /* ---------- TASK CARDS ---------- */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .filters input[type=text],.filters select{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:9px 12px;border-radius:9px;font-size:13px;
  }
  .filters input[type=text]{flex:1;min-width:160px}
  .filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}

  .task{
    background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--muted);
    border-radius:12px;padding:14px 16px;margin-bottom:11px;transition:.15s;
  }
  .task:hover{border-color:var(--accent);border-left-color:var(--accent)}
  .task.p-Critical{border-left-color:var(--red)}
  .task.p-High{border-left-color:var(--amber)}
  .task.p-Medium{border-left-color:var(--accent)}
  .task.p-Low{border-left-color:var(--violet)}
  .task.done{opacity:.72}
  .task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .task-title{font-size:15px;font-weight:700;margin-bottom:3px}
  .task-desc{font-size:12.5px;color:var(--muted);margin-bottom:8px;white-space:pre-wrap}
  .task-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;margin-bottom:10px}
  .chip{background:var(--surface3);border:1px solid var(--border);padding:3px 9px;border-radius:20px;color:var(--muted);font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .chip b{color:var(--text)}
  .chip.staff{color:var(--accent)}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .b-Pending{background:rgba(138,151,166,.18);color:var(--muted)}
  .b-Progress{background:rgba(0,197,255,.16);color:var(--accent)}
  .b-Completed{background:rgba(255,176,32,.16);color:var(--amber)}
  .b-Verified{background:rgba(39,208,123,.16);color:var(--green)}
  .b-Overdue{background:rgba(255,84,112,.18);color:var(--red)}

  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar{flex:1;height:8px;background:var(--surface3);border-radius:10px;overflow:hidden}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#5ad7ff);border-radius:10px;transition:width .3s}
  .bar.full > span{background:linear-gradient(90deg,var(--green),#5fe6a3)}
  .pct{font-size:12px;font-weight:700;width:42px;text-align:right;font-variant-numeric:tabular-nums}

  .task-actions{display:flex;gap:7px;flex-wrap:wrap}
  .btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:500;transition:.15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#001018;border-color:var(--accent);font-weight:700}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.green{background:var(--green);color:#00190c;border-color:var(--green);font-weight:700}
  .btn.ghost{background:none}
  .btn.danger{color:var(--red)} .btn.danger:hover{border-color:var(--red)}
  .btn.sm{padding:5px 10px;font-size:11.5px}

  .note{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-top:8px;font-size:12px}
  .note .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:3px}
  .note.fb{border-left:3px solid var(--green)}

  /* ---------- FORMS ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12px;color:var(--muted);font-weight:500}
  .field input,.field select,.field textarea{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:9px;font-size:13.5px;width:100%;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:70px}

  /* ---------- ANALYTICS ---------- */
  .staff-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
  .staff-row:last-child{border-bottom:none}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:grid;place-items:center;font-weight:900;color:var(--accent);flex-shrink:0}
  .staff-info{min-width:0;flex:0 0 150px}
  .staff-info .nm{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .staff-info .rl{font-size:11px;color:var(--muted)}
  .staff-stats{margin-left:auto;display:flex;gap:16px;text-align:center;flex-wrap:wrap}
  .staff-stats .s .n{font-weight:900;font-size:18px}
  .staff-stats .s .t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

  .donut-wrap{display:flex;gap:22px;flex-wrap:wrap;align-items:center;justify-content:center}
  .donut{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .donut .inner{width:104px;height:104px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .donut .inner .big{font-size:26px;font-weight:900;color:var(--green)}
  .donut .inner .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px}
  .legend .li{display:flex;align-items:center;gap:8px}
  .legend .sw{width:12px;height:12px;border-radius:3px}

  /* ---------- ROLE SELECT / MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;padding:18px}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px;max-width:440px;width:100%;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .modal h3{font-size:18px;font-weight:900;margin-bottom:4px}
  .modal p.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .role-grid{display:grid;gap:10px}
  .role-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:13px;transition:.15s;text-align:left;width:100%;color:var(--text)}
  .role-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .role-card.ceo{border-color:var(--accent)}
  .role-card .ttl{font-weight:700;font-size:14px}
  .role-card .desc{font-size:11.5px;color:var(--muted)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .ico{font-size:42px;opacity:.4;margin-bottom:10px}
  .empty .msg{font-size:14px;font-weight:500}
  .empty .hint{font-size:12px;margin-top:4px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:11px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:.25s;box-shadow:var(--shadow)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  .hidden{display:none!important}
  .row-2{display:flex;gap:10px;flex-wrap:wrap}
  .help{font-size:11.5px;color:var(--muted);margin-top:6px}
  .seg{display:inline-flex;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px}
  .seg button{background:none;border:none;color:var(--muted);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500}
  .seg button.on{background:var(--accent);color:#001018;font-weight:700}

  @media(max-width:640px){
    .form-grid{grid-template-columns:1fr}
    .clock{display:none}
    .brand-text h1{font-size:14px}
    .staff-info{flex-basis:auto}
    .kpi .value{font-size:24px}
    .wrap{padding:12px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <span class="version-badge" id="verBadge">v1.0</span>
  <div class="brand">
    <svg class="logo" viewBox="0 0 40 40" aria-hidden="true">
      <defs><pattern id="dg" width="7" height="7" patternUnits="userSpaceOnUse">
        <circle cx="1.6" cy="1.6" r="1.6" fill="#00c5ff"/></pattern></defs>
      <rect x="2" y="2" width="36" height="36" rx="9" fill="url(#dg)" opacity="0.92"/>
      <rect x="2" y="2" width="36" height="36" rx="9" fill="none" stroke="#00c5ff" stroke-width="1.5" opacity="0.5"/>
    </svg>
    <div class="brand-text">
      <h1>Task Target &amp; Completion</h1>
      <div class="sub">iINTELLIGENCEi &middot; IBI</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
    <div class="whoami" id="whoami"><span class="dot"></span><span id="whoName">—</span></div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
  </div>
</header>

<div class="wrap" id="app" style="display:none">
  <div class="nav" id="nav"></div>
  <div id="view"></div>
</div>

<!-- Role select overlay -->
<div class="overlay" id="roleOverlay">
  <div class="modal">
    <h3>Who is signing in?</h3>
    <p class="sub">Choose your role to continue. The CEO supervises targets; staff update their own progress.</p>
    <div class="role-grid" id="roleGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================
   IBI Task Target & Completion  —  v1.0
   Single-file app. Data persisted in localStorage.
   ========================================================= */
const VERSION = "v1.0";
const DB_KEY = "IBI_TASKS_DB_v1";
const SESSION_KEY = "IBI_TASKS_SESSION";

const DEFAULT_DB = {
  ceoPin: "",                     // empty = no PIN set
  ceoName: "Dr. T. Sasimurugan",
  staff: [
    { id: "s_aswin", name: "S. Aswin", role: "Packaging Manager", active: true },
    { id: "m_ajay",  name: "M. Ajay",  role: "Catalogue Manager",  active: true }
  ],
  tasks: [],
  seq: 1
};

const CATEGORIES = ["Packaging","Catalogue","Listing","Dispatch","Inventory","Customer Support","Accounts","General"];
const PRIORITIES = ["Critical","High","Medium","Low"];

let db = load();
let session = loadSession();   // {role:'ceo'|'staff', id}
let activeTab = "dashboard";
let filters = { q:"", staff:"all", status:"all", priority:"all", sort:"target" };

/* ---------- persistence ---------- */
function load(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return structuredClone(DEFAULT_DB);
    const d = JSON.parse(raw);
    return Object.assign(structuredClone(DEFAULT_DB), d);
  }catch(e){ return structuredClone(DEFAULT_DB); }
}
function save(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function loadSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)) || null; }catch(e){ return null; }
}
function setSession(s){ session=s; if(s) localStorage.setItem(SESSION_KEY, JSON.stringify(s)); else localStorage.removeItem(SESSION_KEY); }

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function staffById(id){ return db.staff.find(s=>s.id===id); }
function isCEO(){ return session && session.role==="ceo"; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
function initials(name){ return name.split(/[\s.]+/).filter(Boolean).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

function fmtDate(iso){
  if(!iso) return "—";
  const d=new Date(iso); if(isNaN(d)) return "—";
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}
function daysLeft(iso){
  if(!iso) return null;
  const d=new Date(iso); d.setHours(23,59,59,999);
  return Math.ceil((d - new Date())/86400000);
}
/* effective status: derives Overdue from target date */
function effStatus(t){
  if(t.status==="Verified") return "Verified";
  if(t.status==="Completed") return "Completed";
  const dl=daysLeft(t.targetDate);
  if(dl!==null && dl<0) return "Overdue";
  return t.status; // Pending or Progress
}
function statusBadgeClass(s){
  return { "Pending":"b-Pending","In Progress":"b-Progress","Progress":"b-Progress",
           "Completed":"b-Completed","Verified":"b-Verified","Overdue":"b-Overdue" }[s] || "b-Pending";
}

/* =========================================================
   ROLE / SESSION
   ========================================================= */
function renderRoleSelect(){
  const grid=$("#roleGrid");
  let html = `<button class="role-card ceo" onclick="loginCEO()">
      <div class="avatar">★</div>
      <div><div class="ttl">${esc(db.ceoName)} <span style="color:var(--accent)">(CEO)</span></div>
      <div class="desc">Set targets, assign work, verify completion &amp; view reports</div></div>
    </button>`;
  db.staff.filter(s=>s.active).forEach(s=>{
    html += `<button class="role-card" onclick="loginStaff('${s.id}')">
      <div class="avatar">${esc(initials(s.name))}</div>
      <div><div class="ttl">${esc(s.name)}</div>
      <div class="desc">${esc(s.role)} — view &amp; update assigned tasks</div></div>
    </button>`;
  });
  grid.innerHTML = html;
}
function loginCEO(){
  if(db.ceoPin){
    const pin = prompt("Enter CEO PIN:");
    if(pin===null) return;
    if(pin!==db.ceoPin){ toast("Incorrect PIN"); return; }
  }
  setSession({role:"ceo"});
  enterApp();
}
function loginStaff(id){ setSession({role:"staff",id}); enterApp(); }
function logout(){ setSession(null); activeTab="dashboard"; $("#app").style.display="none"; $("#roleOverlay").classList.remove("hidden"); renderRoleSelect(); updateWhoami(); }

function enterApp(){
  $("#roleOverlay").classList.add("hidden");
  $("#app").style.display="block";
  activeTab = isCEO() ? "dashboard" : "mytasks";
  updateWhoami();
  renderNav();
  render();
}
function updateWhoami(){
  const w=$("#whoName");
  if(!session){ w.innerHTML="—"; return; }
  if(isCEO()) w.innerHTML = `<b>${esc(db.ceoName)}</b> · CEO`;
  else { const s=staffById(session.id); w.innerHTML = `<b>${esc(s?s.name:"Staff")}</b> · ${esc(s?s.role:"")}`; }
}

/* =========================================================
   NAV
   ========================================================= */
function renderNav(){
  const tabs = isCEO()
    ? [["dashboard","Dashboard"],["tasks","All Tasks"],["new","+ Assign Task"],["reports","Reports"],["team","Team"],["settings","Settings"]]
    : [["mytasks","My Tasks"]];
  let html = tabs.map(([id,label])=>`<button class="${activeTab===id?'active':''}" onclick="go('${id}')">${label}</button>`).join("");
  html += `<button onclick="logout()" style="margin-left:auto;color:var(--red)">Sign out</button>`;
  $("#nav").innerHTML = html;
}
function go(tab){ activeTab=tab; renderNav(); render(); window.scrollTo(0,0); }

/* =========================================================
   RENDER ROUTER
   ========================================================= */
function render(){
  const v=$("#view");
  switch(activeTab){
    case "dashboard": v.innerHTML=viewDashboard(); break;
    case "tasks":     v.innerHTML=viewTasks(false); break;
    case "mytasks":   v.innerHTML=viewTasks(true); break;
    case "new":       v.innerHTML=viewNewTask(); break;
    case "reports":   v.innerHTML=viewReports(); break;
    case "team":      v.innerHTML=viewTeam(); break;
    case "settings":  v.innerHTML=viewSettings(); break;
    default: v.innerHTML="";
  }
}

/* =========================================================
   DASHBOARD (CEO)
   ========================================================= */
function statsFor(tasks){
  const total=tasks.length;
  let completed=0,verified=0,progress=0,pending=0,overdue=0,onTime=0,late=0;
  tasks.forEach(t=>{
    const e=effStatus(t);
    if(e==="Verified") verified++;
    if(e==="Verified"||e==="Completed") completed++;
    if(e==="In Progress") progress++;
    if(e==="Pending") pending++;
    if(e==="Overdue") overdue++;
    if((t.status==="Completed"||t.status==="Verified") && t.completedDate && t.targetDate){
      if(new Date(t.completedDate) <= new Date(t.targetDate+"T23:59:59")) onTime++; else late++;
    }
  });
  const rate = total? Math.round(completed/total*100):0;
  return {total,completed,verified,progress,pending,overdue,onTime,late,rate};
}

/* =========================================================
   TASK LIST  (CEO: all  |  staff: own)
   ========================================================= */
function viewTasks(mine){
  let list = db.tasks.slice();
  if(mine) list = list.filter(t=>t.assignedTo===session.id);

  // filters
  if(filters.q){ const q=filters.q.toLowerCase(); list=list.filter(t=>(t.title+" "+t.description).toLowerCase().includes(q)); }
  if(!mine && filters.staff!=="all") list=list.filter(t=>t.assignedTo===filters.staff);
  if(filters.priority!=="all") list=list.filter(t=>t.priority===filters.priority);
  if(filters.status!=="all") list=list.filter(t=>effStatus(t)===filters.status);

  // sort
  const prRank={Critical:0,High:1,Medium:2,Low:3};
  list.sort((a,b)=>{
    if(filters.sort==="priority") return prRank[a.priority]-prRank[b.priority];
    if(filters.sort==="progress") return (b.progress||0)-(a.progress||0);
    return (a.targetDate||"9999").localeCompare(b.targetDate||"9999"); // target date
  });

  const staffOpts = db.staff.map(s=>`<option value="${s.id}" ${filters.staff===s.id?'selected':''}>${esc(s.name)}</option>`).join("");
  const statusOpts = ["Pending","In Progress","Completed","Verified","Overdue"].map(s=>`<option value="${s}" ${filters.status===s?'selected':''}>${s}</option>`).join("");
  const prioOpts = PRIORITIES.map(p=>`<option value="${p}" ${filters.priority===p?'selected':''}>${p}</option>`).join("");

  const filterBar = `<div class="filters">
    <input type="text" placeholder="Search tasks…" value="${esc(filters.q)}" oninput="filters.q=this.value;render()">
    ${mine?"":`<select onchange="filters.staff=this.value;render()"><option value="all">All staff</option>${staffOpts}</select>`}
    <select onchange="filters.status=this.value;render()"><option value="all">All status</option>${statusOpts}</select>
    <select onchange="filters.priority=this.value;render()"><option value="all">All priority</option>${prioOpts}</select>
    <select onchange="filters.sort=this.value;render()">
      <option value="target" ${filters.sort==='target'?'selected':''}>Sort: Target date</option>
      <option value="priority" ${filters.sort==='priority'?'selected':''}>Sort: Priority</option>
      <option value="progress" ${filters.sort==='progress'?'selected':''}>Sort: Progress</option>
    </select>
  </div>`;

  let cards = list.map(t=>taskCard(t,false)).join("");
  if(!cards){
    cards = `<div class="empty"><div class="ico">▤</div><div class="msg">No tasks found.</div>
      <div class="hint">${mine?"You have no tasks matching these filters.":"Try clearing filters or assign a new task."}</div></div>`;
  }

  const header = mine
    ? `<h2 class="section">My Tasks</h2>`
    : `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
         <h2 class="section" style="margin:0">All Tasks (${list.length})</h2>
         <button class="btn primary sm" onclick="go('new')">+ Assign Task</button></div>`;

  return `<div class="card">${header}${filterBar}${cards}</div>`;
}

function taskCard(t,compact){
  const e=effStatus(t);
  const st=staffById(t.assignedTo);
  const dl=daysLeft(t.targetDate);
  const done = e==="Verified"||e==="Completed";
  let dueTxt = fmtDate(t.targetDate);
  if(dl!==null && e!=="Verified" && e!=="Completed"){
    if(dl<0) dueTxt=`<span style="color:var(--red)">${fmtDate(t.targetDate)} · ${Math.abs(dl)}d late</span>`;
    else if(dl===0) dueTxt=`<span style="color:var(--amber)">${fmtDate(t.targetDate)} · due today</span>`;
    else if(dl<=2) dueTxt=`<span style="color:var(--amber)">${fmtDate(t.targetDate)} · ${dl}d left</span>`;
    else dueTxt=`${fmtDate(t.targetDate)} · ${dl}d left`;
  }

  const meta = `<div class="task-meta">
    <span class="chip staff">▸ <b>${esc(st?st.name:"Unassigned")}</b></span>
    <span class="chip">${esc(t.category)}</span>
    <span class="chip">🎯 ${dueTxt}</span>
    <span class="badge ${statusBadgeClass(e)}">${e}</span>
    <span class="chip">${esc(t.priority)}</span>
  </div>`;

  const progress = `<div class="progress-row">
    <div class="bar ${(t.progress||0)>=100?'full':''}"><span style="width:${t.progress||0}%"></span></div>
    <span class="pct">${t.progress||0}%</span>
  </div>`;

  const notes = (t.staffNotes?`<div class="note"><div class="lbl">Staff update</div>${esc(t.staffNotes)}</div>`:"")
    + (t.ceoFeedback?`<div class="note fb"><div class="lbl">CEO feedback</div>${esc(t.ceoFeedback)}</div>`:"");

  // actions depend on role
  let actions="";
  if(isCEO()){
    if(e==="Completed") actions=`
      <button class="btn green sm" onclick="verifyTask('${t.id}')">✓ Verify done</button>
      <button class="btn sm" onclick="ceoFeedback('${t.id}')">Add feedback</button>
      <button class="btn sm" onclick="reopenTask('${t.id}')">Reopen</button>`;
    else if(e==="Verified") actions=`<button class="btn sm" onclick="reopenTask('${t.id}')">Reopen</button>`;
    if(!compact) actions += `
      <button class="btn ghost sm" onclick="editTask('${t.id}')">Edit</button>
      <button class="btn ghost sm danger" onclick="deleteTask('${t.id}')">Delete</button>`;
  } else {
    // staff
    if(e!=="Verified"){
      actions=`<button class="btn primary sm" onclick="updateProgress('${t.id}')">Update progress</button>`;
      if(e!=="Completed") actions+=`<button class="btn green sm" onclick="markComplete('${t.id}')">Mark complete</button>`;
    }
  }

  return `<div class="task p-${t.priority} ${done?'done':''}">
    <div class="task-top">
      <div style="min-width:0;flex:1">
        <div class="task-title">${esc(t.title)}</div>
        ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:""}
      </div>
    </div>
    ${meta}
    ${progress}
    ${notes}
    ${actions?`<div class="task-actions">${actions}</div>`:""}
  </div>`;
}

function editTask(id){ activeTab="new"; renderNav(); $("#view").innerHTML=viewNewTask(id); window.scrollTo(0,0); }

function saveTask(editId){
  const title=$("#f_title").value.trim();
  const staff=$("#f_staff").value;
  const date=$("#f_date").value;
  if(!title){ toast("Please enter a task title"); return; }
  if(!staff){ toast("Please assign to a staff member"); return; }
  if(!date){ toast("Please set a target date"); return; }
  const data={
    title, description:$("#f_desc").value.trim(),
    assignedTo:staff, category:$("#f_cat").value, priority:$("#f_prio").value, targetDate:date
  };
  if(editId){
    const t=db.tasks.find(x=>x.id===editId); Object.assign(t,data); toast("Task updated");
  }else{
    db.tasks.push(Object.assign({
      id:"t_"+(db.seq++), createdDate:new Date().toISOString(), assignedBy:db.ceoName,
      status:"Pending", progress:0, completedDate:null, staffNotes:"", ceoFeedback:""
    },data));
    toast("Task assigned to "+ (staffById(staff)?.name||"staff"));
  }
  save(); go("tasks");
}
function deleteTask(id){
  if(!confirm("Delete this task permanently?")) return;
  db.tasks=db.tasks.filter(t=>t.id!==id); save(); render(); toast("Task deleted");
}

/* ---------- staff actions ---------- */
function updateProgress(id){
  const t=db.tasks.find(x=>x.id===id);
  const val=prompt("Progress % complete (0–100):", t.progress||0);
  if(val===null) return;
  let p=parseInt(val,10); if(isNaN(p)) return toast("Enter a number");
  p=Math.max(0,Math.min(100,p));
  const note=prompt("Add a short update note (optional):", t.staffNotes||"");
  t.progress=p;
  if(note!==null) t.staffNotes=note.trim();
  if(p>=100){ if(confirm("100% reached — mark this task as complete now?")){ t.status="Completed"; t.completedDate=new Date().toISOString(); } }
  else if(p>0 && t.status==="Pending"){ t.status="In Progress"; }
  save(); render(); toast("Progress updated");
}
function markComplete(id){
  const t=db.tasks.find(x=>x.id===id);
  const note=prompt("Completion note for the CEO (optional):", t.staffNotes||"");
  if(note!==null) t.staffNotes=note.trim();
  t.status="Completed"; t.progress=100; t.completedDate=new Date().toISOString();
  save(); render(); toast("Marked complete — awaiting CEO verification");
}

/* ---------- CEO actions ---------- */
function verifyTask(id){
  const t=db.tasks.find(x=>x.id===id);
  t.status="Verified"; if(!t.completedDate) t.completedDate=new Date().toISOString();
  save(); render(); toast("Task verified ✓");
}
function reopenTask(id){
  const t=db.tasks.find(x=>x.id===id);
  t.status = (t.progress>0 && t.progress<100) ? "In Progress" : "Pending";
  t.completedDate=null; save(); render(); toast("Task reopened");
}
function ceoFeedback(id){
  const t=db.tasks.find(x=>x.id===id);
  const fb=prompt("Feedback for staff:", t.ceoFeedback||"");
  if(fb===null) return;
  t.ceoFeedback=fb.trim(); save(); render(); toast("Feedback saved");
}

          <div class="li"><span class="sw" style="background:var(--red)"></span> Overdue: <b style="margin-left:4px">${s.overdue}</b></div>
        </div>
      </div>
    </div>
    <div class="kpis" style="margin-top:16px">
      <div class="kpi green"><div class="label">On-time delivery</div><div class="value">${onTimeRate}<small>%</small></div></div>
      <div class="kpi cyan"><div class="label">Tasks completed</div><div class="value">${totalCompleted}</div></div>
      <div class="kpi"><div class="label">Delivered late</div><div class="value">${s.late}</div></div>
    </div>

/* =========================================================
   EXPORT / IMPORT
   ========================================================= */
function downloadFile(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}
function exportJSON(){
  downloadFile(`ibi-tasks-backup-${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(db,null,2), "application/json");
  toast("Backup downloaded");
}
function restoreJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.tasks) throw 0; db=Object.assign(structuredClone(DEFAULT_DB),d); save(); renderRoleSelect(); render(); toast("Backup restored"); }catch(e){ toast("Invalid backup file"); } };
  r.readAsText(file); input.value="";
}
function exportCSV(){
  const head=["Title","Assigned To","Role","Category","Priority","Status","Progress%","Target Date","Completed Date","Staff Note","CEO Feedback"];
  const rows=db.tasks.map(t=>{ const s=staffById(t.assignedTo);
    return [t.title, s?s.name:"", s?s.role:"", t.category, t.priority, effStatus(t), t.progress||0, t.targetDate||"", t.completedDate?t.completedDate.slice(0,10):"", t.staffNotes||"", t.ceoFeedback||""]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","); });
  downloadFile(`ibi-tasks-${new Date().toISOString().slice(0,10)}.csv`, [head.join(","),...rows].join("\n"), "text/csv");
  toast("CSV downloaded");
}

function boot(){
  $("#verBadge").textContent=VERSION;
  applyTheme(localStorage.getItem("IBI_TASKS_THEME")||"dark");
  tickClock(); setInterval(tickClock,1000);
  renderRoleSelect();
  if(session && (isCEO() || staffById(session.id))) enterApp();
  else { setSession(null); $("#roleOverlay").classList.remove("hidden"); }
}
window.go=go; window.logout=logout; window.loginCEO=loginCEO; window.loginStaff=loginStaff;
window.saveTask=saveTask; window.deleteTask=deleteTask; window.editTask=editTask;
window.updateProgress=updateProgress; window.markComplete=markComplete;
window.verifyTask=verifyTask; window.reopenTask=reopenTask; window.ceoFeedback=ceoFeedback;
window.addStaff=addStaff; window.editStaff=editStaff; window.toggleStaff=toggleStaff;
window.savePin=savePin; window.clearPin=clearPin; window.clearAll=clearAll;
window.exportJSON=exportJSON; window.restoreJSON=restoreJSON; window.exportCSV=exportCSV;
boot();
</script>
